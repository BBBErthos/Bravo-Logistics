<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bravo API Debug</title>
<style>
body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 24px; font-size: 13px; }
h2 { color: #f0a500; margin-bottom: 16px; }
.box { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
.ok { color: #3fb950; }
.err { color: #f85149; }
.info { color: #58a6ff; }
.warn { color: #f0a500; }
pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; margin-top: 8px; }
button { background: #f0a500; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
</style>
</head>
<body>
<h2>Bravo — API Connection Debug</h2>

<div class="box">
  <div>Token: <span class="info" id="tokenDisplay"></span></div>
  <div>Material Master Board ID: <span class="info">18407396726</span></div>
  <div>Receipts Board ID: <span class="info">18407084838</span></div>
  <div>MTF Board ID: <span class="info">18407069511</span></div>
</div>

<button onclick="testToken()">1. Test Token</button>
<button onclick="testBoardAccess()">2. Test Board Access</button>
<button onclick="testFirstItems()">3. Load First 5 Items</button>
<button onclick="testColumns()">4. Get Column IDs</button>
<button onclick="clearLog()">Clear Log</button>

<div class="box" id="log">
  <div class="info">Click the buttons above to run tests...</div>
</div>

<script>
const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0MjAyOTczNSwiYWFpIjoxMSwidWlkIjoxMDE2NTU1NDEsImlhZCI6IjIwMjYtMDQtMDZUMTY6MTU6NDEuMDAwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjM0MDM3NTMzLCJyZ24iOiJ1c2UxIn0.xhq8Fz24KVtwvLHPuxUR4lZ6Y_WoZHvximfIa9hmnYM";
const MM_BOARD = "18407396726";
const REC_BOARD = "18407084838";

document.getElementById("tokenDisplay").textContent = TOKEN.substring(0,40) + "...";

function log(msg, type="info") {
  const el = document.getElementById("log");
  const line = document.createElement("div");
  line.className = type;
  line.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function logPre(obj) {
  const el = document.getElementById("log");
  const pre = document.createElement("pre");
  pre.textContent = JSON.stringify(obj, null, 2);
  el.appendChild(pre);
}

function clearLog() {
  document.getElementById("log").innerHTML = '<div class="info">Log cleared.</div>';
}

async function gql(query, variables={}) {
  const r = await fetch("https://api.monday.com/v2", {
    method: "POST",
    headers: {
      "Authorization": TOKEN,
      "Content-Type": "application/json",
      "API-Version": "2024-01"
    },
    body: JSON.stringify({query, variables})
  });
  log(`HTTP Status: ${r.status} ${r.statusText}`, r.ok ? "ok" : "err");
  const text = await r.text();
  log(`Raw response length: ${text.length} chars`);
  try {
    const data = JSON.parse(text);
    if(data.errors) {
      log("GraphQL errors: " + JSON.stringify(data.errors), "err");
      return null;
    }
    return data.data;
  } catch(e) {
    log("JSON parse error: " + e.message, "err");
    log("Raw response: " + text.substring(0, 500), "warn");
    return null;
  }
}

async function testToken() {
  log("Testing API token...", "info");
  try {
    const d = await gql(`query { me { id name email account { id name } } }`);
    if(d) {
      log(`✓ Token valid! User: ${d.me.name} (${d.me.email})`, "ok");
      log(`✓ Account: ${d.me.account.name} (ID: ${d.me.account.id})`, "ok");
    }
  } catch(e) {
    log("✗ Token test failed: " + e.message, "err");
  }
}

async function testBoardAccess() {
  log("Testing board access...", "info");
  try {
    const d = await gql(`query { boards(ids:[${MM_BOARD}]) { id name description items_count } }`);
    if(d && d.boards && d.boards.length > 0) {
      const b = d.boards[0];
      log(`✓ Material Master board found: "${b.name}" — ${b.items_count} items`, "ok");
    } else {
      log("✗ Board not found or no access. Response:", "err");
      logPre(d);
    }
  } catch(e) {
    log("✗ Board access failed: " + e.message, "err");
  }
}

async function testFirstItems() {
  log("Loading first 5 items from Material Master...", "info");
  try {
    const d = await gql(`
      query {
        boards(ids:[${MM_BOARD}]) {
          items_page(limit: 5) {
            cursor
            items {
              id
              name
              column_values { id text }
            }
          }
        }
      }
    `);
    if(d && d.boards[0]) {
      const items = d.boards[0].items_page.items;
      log(`✓ Got ${items.length} items`, "ok");
      items.forEach(item => {
        log(`  Row: "${item.name}"`, "ok");
        item.column_values.forEach(cv => {
          if(cv.text) log(`    ${cv.title} (${cv.id}): "${cv.text}"`, "info");
        });
      });
    } else {
      log("✗ No items returned", "err");
      logPre(d);
    }
  } catch(e) {
    log("✗ Items load failed: " + e.message, "err");
  }
}

async function testColumns() {
  log("Getting column IDs for Receipts board...", "info");
  try {
    const d = await gql(`
      query {
        boards(ids:[${REC_BOARD}]) {
          columns { id title type }
          groups { id title }
        }
      }
    `);
    if(d && d.boards[0]) {
      log("✓ Receipts board columns:", "ok");
      d.boards[0].columns.forEach(c => {
        log(`  "${c.title}" → ID: ${c.id} (${c.type})`, "info");
      });
      log("✓ Receipts board groups:", "ok");
      d.boards[0].groups.forEach(g => {
        log(`  "${g.title}" → ID: ${g.id}`, "info");
      });
    }
  } catch(e) {
    log("✗ Column fetch failed: " + e.message, "err");
  }
}
</script>
</body>
</html>
